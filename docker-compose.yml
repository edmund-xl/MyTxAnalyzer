services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rca_workbench
      POSTGRES_USER: rca
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rca -d rca_workbench"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: rca
      POSTGRES_PWD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"

  api:
    build: ./backend
    env_file: .env
    ports:
      - "8100:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
      temporal:
        condition: service_started
    volumes:
      - ./docs/spec:/app/docs/spec:ro
      - ./vendor/txanalyzer:/opt/txanalyzer

  worker:
    build: ./backend
    env_file: .env
    command: ["python", "-m", "app.workflows.temporal_worker"]
    depends_on:
      api:
        condition: service_started
      temporal:
        condition: service_started
    volumes:
      - ./docs/spec:/app/docs/spec:ro
      - ./vendor/txanalyzer:/opt/txanalyzer

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3100:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
