version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rca_workbench
      POSTGRES_USER: rca
      POSTGRES_PASSWORD: REPLACE_ME_POSTGRES_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: REPLACE_ME_MINIO_ROOT_PASSWORD
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: rca
      POSTGRES_PWD: REPLACE_ME_POSTGRES_PASSWORD
      POSTGRES_SEEDS: postgres
    depends_on:
      - postgres
    ports:
      - "7233:7233"

  api:
    build: ./backend
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - minio
      - redis
      - temporal
    volumes:
      - /opt/txanalyzer:/opt/txanalyzer

volumes:
  postgres_data:
  minio_data:
